bio: |
  Raphael Takyi is a Physician-scientist with a strong foundation in both patient care and biomedical science research, currently completing my PhD at the Institute of Psychiatry and Neuroscience of Paris. 
  Experienced in academic teaching and deeply committed to impacting the next generation through knowledge-sharing. 
  Passionate about advancing the field of neurology by using advanced neuroimaging to improve patient care especially in neurodegenerative diseases and stroke. 
  Proficient in neuroimaging techniques (SPM, FSL, FreeSurfer), Python and R programming, and statistical modeling, 
  with a focus on improving diagnostics and outcomes in neurological disorders. Strong track record in multi-disciplinary collaboration, scientific communication, and innovative clinical leadership.

